<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .calculator-container {
            background: rgba(255, 255, 255, 0.1);
            padding: 2rem;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            text-align: center;
            min-width: 400px;
        }
        h1 {
            color: #fff;
            margin-bottom: 2rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        .input-group {
            margin-bottom: 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .input-group label {
            margin-bottom: 0.5rem;
            font-weight: bold;
        }
        input[type="number"], select {
            padding: 0.8rem;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 1rem;
            width: 200px;
            text-align: center;
        }
        input[type="number"]::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }
        select {
            cursor: pointer;
        }
        select option {
            background: #333;
            color: white;
        }
        .calculate-btn {
            background: linear-gradient(45deg, #ff6b6b, #ee5a24);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin: 1rem 0;
            transition: transform 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        .calculate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }
        .result {
            margin-top: 1.5rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            font-size: 1.5rem;
            font-weight: bold;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error {
            color: #ff6b6b;
            background: rgba(255, 107, 107, 0.1);
        }
        .success {
            color: #4ecdc4;
            background: rgba(78, 205, 196, 0.1);
        }
    </style>
</head>
<body>
    <div class="calculator-container">
        <h1>🧮 Calculator</h1>
        
        <div class="input-group">
            <label for="num1">First Number:</label>
            <input type="number" id="num1" placeholder="Enter first number" step="any">
        </div>
        
        <div class="input-group">
            <label for="operation">Operation:</label>
            <select id="operation">
                <option value="add">➕ Addition</option>
                <option value="subtract">➖ Subtraction</option>
                <option value="multiply">✖️ Multiplication</option>
                <option value="divide">➗ Division</option>
            </select>
        </div>
        
        <div class="input-group">
            <label for="num2">Second Number:</label>
            <input type="number" id="num2" placeholder="Enter second number" step="any">
        </div>
        
        <button class="calculate-btn" onclick="calculate()">Calculate</button>
        
        <div id="result" class="result">
            Result will appear here
        </div>
    </div>

    <script>
        function calculate() {
            const num1 = parseFloat(document.getElementById('num1').value);
            const num2 = parseFloat(document.getElementById('num2').value);
            const operation = document.getElementById('operation').value;
            const resultDiv = document.getElementById('result');
            
            // Validation
            if (isNaN(num1) || isNaN(num2)) {
                resultDiv.innerHTML = 'Please enter valid numbers';
                resultDiv.className = 'result error';
                return;
            }
            
            if (operation === 'divide' && num2 === 0) {
                resultDiv.innerHTML = 'Cannot divide by zero!';
                resultDiv.className = 'result error';
                return;
            }
            
            let result;
            let operationSymbol;
            
            switch(operation) {
                case 'add':
                    result = num1 + num2;
                    operationSymbol = '+';
                    break;
                case 'subtract':
                    result = num1 - num2;
                    operationSymbol = '-';
                    break;
                case 'multiply':
                    result = num1 * num2;
                    operationSymbol = '×';
                    break;
                case 'divide':
                    result = num1 / num2;
                    operationSymbol = '÷';
                    break;
            }
            
            resultDiv.innerHTML = `${num1} ${operationSymbol} ${num2} = ${result}`;
            resultDiv.className = 'result success';
        }
        
        // Enter key support
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                calculate();
            }
        });
    </script>
</body>
</html>
